syntax = "proto3";

import "SiLAFramework.proto";

package sila2.org.silastandard.examples.greetingprovider.v1;

/* Example implementation of a minimum Feature. Provides a Greeting to the Client and a StartYear property, informing about the year the Server has been started. */
service GreetingProvider {
  /* Reset the server. Raises an error if the reset fails. */
  rpc Reset (sila2.org.silastandard.examples.greetingprovider.v1.Reset_Parameters) returns (sila2.org.silastandard.CommandConfirmation) {}
  /* Monitor the state of Reset */
  rpc Reset_Info (sila2.org.silastandard.CommandExecutionUUID) returns (stream sila2.org.silastandard.ExecutionInfo) {}
  /* Retrieve result of Reset */
  rpc Reset_Result(sila2.org.silastandard.CommandExecutionUUID) returns (sila2.org.silastandard.examples.greetingprovider.v1.Reset_Responses) {}
  /* Current server status. 1: Idle, 2: Running, 3: Error, 4: Starting. */
  rpc Subscribe_Status (sila2.org.silastandard.examples.greetingprovider.v1.Subscribe_Status_Parameters) returns (stream sila2.org.silastandard.examples.greetingprovider.v1.Subscribe_Status_Responses) {}
}

/* Parameters for Reset */
message Reset_Parameters {
}

/* Responses of Reset */
message Reset_Responses {
}

/* Parameters for Status */
message Subscribe_Status_Parameters {
}

/* Responses of Status */
message Subscribe_Status_Responses {
  sila2.org.silastandard.Integer Status = 1;  /* Current server status. 1: Idle, 2: Running, 3: Error, 4: Starting. */
}
