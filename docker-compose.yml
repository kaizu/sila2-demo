x-sila2-server: &sila2-server
  build:
    context: ./servers/station_server
    dockerfile: Dockerfile
  environment:
    - PYTHONUNBUFFERED=1
    - SILA_SERVER_TYPE=StationServer
  command: ["python", "-m", "station_server", "--ip-address", "0.0.0.0", "--port", "50052", "--insecure"]

x-trolley-arm-server: &trolley-arm-server
  build:
    context: ./servers/trolley_arm_server
    dockerfile: Dockerfile
  environment:
    - PYTHONUNBUFFERED=1
    - SILA_SERVER_TYPE=TrolleyArmServer
  command: ["python", "-m", "trolley_arm_server", "--ip-address", "0.0.0.0", "--port", "50052", "--insecure"]

services:
  sila2-server-1:
    <<: *sila2-server
    ports:
      - "50052:50052"
    environment:
      - SILA_SERVER_NAME=Agilent-Microplate-Centrifuge

  sila2-server-2:
    <<: *sila2-server
    ports:
      - "50053:50052"
    environment:
      - SILA_SERVER_NAME=Agilent-PlateLoc

  sila2-server-3:
    <<: *sila2-server
    ports:
      - "50054:50052"
    environment:
      - SILA_SERVER_NAME=Azenta-Automated-Plate-Seal-Remover

  sila2-server-4:
    <<: *sila2-server
    ports:
      - "50055:50052"
    environment:
      - SILA_SERVER_NAME=ThermoFisher-Thermal-Cycler

  sila2-server-5:
    <<: *sila2-server
    ports:
      - "50056:50052"
    environment:
      - SILA_SERVER_NAME=Tecan-Fluent

  trolley-arm-server-1:
    <<: *trolley-arm-server
    ports:
      - "50057:50052"
    environment:
      - SILA_SERVER_NAME=Trolley-Arm-Server

  fastapi:
    build:
      context: ./fastapi_app
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
