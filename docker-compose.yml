services:
  sila2-server:
    build:
      context: ./servers
      dockerfile: Dockerfile
    ports:
      - "50052:50052"
    environment:
      - PYTHONUNBUFFERED=1
      - SILA_SERVER_NAME=MySila2Server
      - SILA_SERVER_TYPE=StationServer
    command: ["python", "-m", "my_sila2_package", "--ip-address", "0.0.0.0", "--port", "50052", "--insecure"]
